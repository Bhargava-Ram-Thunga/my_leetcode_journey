name: 🔄 Sync LeetCode Submissions

on:
  schedule:
    # Every 30 minutes — picks up new accepted submissions quickly
    - cron: "*/30 * * * *"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Export & Push New Solutions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🔧 Configure git identity
        run: |
          git config user.name "LeetCode Sync Bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install leetcode-export requests

      - name: 🔒 Verify cookie ownership
        env:
          LEETCODE_COOKIE: ${{ secrets.LEETCODE_COOKIE }}
        run: |
          python - << 'EOF'
          import os, base64, json, sys
          cookie = os.environ["LEETCODE_COOKIE"]
          session_val = next(
              (p.split("=",1)[1] for p in cookie.split(";") if p.strip().startswith("LEETCODE_SESSION=")), ""
          )
          if not session_val:
              print("❌ No LEETCODE_SESSION found in cookie")
              sys.exit(1)
          parts = session_val.split(".")
          pad = "=" * (4 - len(parts[1]) % 4) if len(parts[1]) % 4 else ""
          payload = json.loads(base64.urlsafe_b64decode(parts[1] + pad))
          slug = (payload.get("user_slug") or payload.get("username") or "").lower()
          allowed = {"bhargava-ram-thunga", "bh4gav"}
          if slug not in allowed:
              print(f"❌ Cookie belongs to '{slug}' — NOT our account. Aborting!")
              sys.exit(1)
          print(f"✅ Cookie verified: '{slug}' is our account")
          EOF

      - name: 🔄 Sync submissions
        env:
          LEETCODE_COOKIE: ${{ secrets.LEETCODE_COOKIE }}
        run: python sync.py

      - name: ✅ Show result
        run: |
          echo "=== Last 5 commits ==="
          git log --oneline -5
