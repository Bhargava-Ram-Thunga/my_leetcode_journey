name: 🔄 Sync LeetCode Submissions

on:
  schedule:
    # Runs every 12 hours (adjust as needed)
    - cron: "0 */12 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Export & Push New Solutions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install leetcode-export requests

      - name: 🔄 Sync submissions
        env:
          LEETCODE_COOKIE: ${{ secrets.LEETCODE_COOKIE }}
        run: python sync.py

      - name: ✅ Show result
        run: |
          echo "Sync complete. Git log:"
          git log --oneline -5
